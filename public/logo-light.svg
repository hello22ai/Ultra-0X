<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Ultra X Player">
  <defs>
    <!-- Richer metallic gold gradient (reads on light backgrounds) -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9760F"/>
      <stop offset="25%" stop-color="#E8B923"/>
      <stop offset="50%" stop-color="#C79214"/>
      <stop offset="75%" stop-color="#F2C94C"/>
      <stop offset="100%" stop-color="#8A5E0C"/>
    </linearGradient>
    <!-- Black gradient for the PLAYER wordmark + dotted arm -->
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2820"/>
      <stop offset="100%" stop-color="#0c0b07"/>
    </linearGradient>
    <!-- Halftone dot pattern (dark ink, visible on white) -->
    <radialGradient id="dotFade" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#3a382e"/>
      <stop offset="100%" stop-color="#0c0b07"/>
    </radialGradient>
    <pattern id="halftone" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="4.5" fill="url(#dotFade)"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ULTRA -->
  <text x="300" y="118" text-anchor="middle" fill="url(#gold)"
        font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="92" letter-spacing="22">ULTRA</text>

  <!-- X mark: left arm halftone (dark dots), right arm solid gold -->
  <g>
    <!-- Left descending arm (dots) -->
    <polygon points="180,170 250,170 420,470 350,470" fill="url(#halftone)"/>
    <!-- Right descending arm (gold solid, 3D) -->
    <polygon points="350,170 420,170 250,470 180,470" fill="url(#gold)" filter="url(#glow)"/>
    <!-- Center spark -->
    <circle cx="300" cy="320" r="9" fill="#C79214"/>
  </g>

  <!-- PLAYER with flanking gold lines -->
  <line x1="120" y1="540" x2="215" y2="540" stroke="url(#gold)" stroke-width="3"/>
  <line x1="385" y1="540" x2="480" y2="540" stroke="url(#gold)" stroke-width="3"/>
  <text x="300" y="556" text-anchor="middle" fill="url(#ink)"
        font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="64" letter-spacing="16">PLAYER</text>
</svg>
