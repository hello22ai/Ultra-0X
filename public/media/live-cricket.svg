<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="lcSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123a7e"/>
      <stop offset="0.6" stop-color="#0a1a38"/>
      <stop offset="1" stop-color="#04060f"/>
    </linearGradient>
    <radialGradient id="lcField" cx="0.5" cy="1" r="0.85">
      <stop offset="0" stop-color="#37b24d"/>
      <stop offset="0.6" stop-color="#166534"/>
      <stop offset="1" stop-color="#0a1a38" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lcLamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffbe6"/>
      <stop offset="1" stop-color="#fffbe6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lcVig" cx="0.5" cy="0.4" r="0.85">
      <stop offset="0.5" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="lcGrain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.045"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    <filter id="lcBlur"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#lcSky)"/>
  <!-- floodlights -->
  <g fill="url(#lcLamp)" opacity="0.6">
    <polygon points="150,320 100,110 200,110"/>
    <polygon points="1130,320 1080,110 1180,110"/>
    <polygon points="640,260 610,80 670,80"/>
  </g>
  <g stroke="#fffbe6" stroke-width="8" opacity="0.9">
    <line x1="150" y1="110" x2="150" y2="320"/>
    <line x1="1130" y1="110" x2="1130" y2="320"/>
  </g>
  <!-- crowd tiers -->
  <g filter="url(#lcBlur)" opacity="0.55">
    <ellipse cx="640" cy="500" rx="760" ry="200" fill="#1b2a52"/>
    <ellipse cx="640" cy="500" rx="760" ry="200" fill="none" stroke="#3a4d82" stroke-width="14" stroke-dasharray="3 7"/>
  </g>
  <!-- field + pitch -->
  <ellipse cx="640" cy="740" rx="820" ry="330" fill="url(#lcField)"/>
  <ellipse cx="640" cy="720" rx="540" ry="200" fill="none" stroke="#8ee69f" stroke-width="3" opacity="0.5"/>
  <rect x="600" y="560" width="80" height="150" rx="6" fill="#d8caa6" opacity="0.85"/>
  <g stroke="#f5f0e0" stroke-width="6">
    <line x1="628" y1="576" x2="628" y2="626"/>
    <line x1="640" y1="576" x2="640" y2="626"/>
    <line x1="652" y1="576" x2="652" y2="626"/>
  </g>
  <!-- ball streak -->
  <path d="M470 480 q90 -30 170 90" fill="none" stroke="#ff5252" stroke-width="3" opacity="0.4" stroke-dasharray="6 10"/>
  <circle cx="470" cy="480" r="15" fill="#c81e1e" stroke="#fff" stroke-width="2"/>
  <text x="640" y="250" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="118" font-weight="900" letter-spacing="6" fill="#ffd43b">IND vs AUS</text>
  <text x="640" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" letter-spacing="11" fill="#9ec5ff">LIVE · STAR SPORTS · 4K</text>
  <rect width="1280" height="720" fill="url(#lcVig)"/>
  <rect width="1280" height="720" filter="url(#lcGrain)" opacity="0.4"/>
</svg>
