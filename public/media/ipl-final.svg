<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="iplSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123a7e"/>
      <stop offset="0.5" stop-color="#0a1f45"/>
      <stop offset="1" stop-color="#03040c"/>
    </linearGradient>
    <radialGradient id="iplPitch" cx="0.5" cy="0.66" r="0.62">
      <stop offset="0" stop-color="#37b24d" stop-opacity="0.95"/>
      <stop offset="0.65" stop-color="#166534" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0a1f45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iplLamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffbe6"/>
      <stop offset="1" stop-color="#fffbe6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iplVig" cx="0.5" cy="0.42" r="0.8">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="iplGrain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    <filter id="iplBlur"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="600" height="900" fill="url(#iplSky)"/>
  <!-- floodlight beams -->
  <g fill="url(#iplLamp)" opacity="0.8">
    <polygon points="80,150 44,52 116,52"/>
    <polygon points="520,150 484,52 556,52"/>
    <polygon points="300,120 276,40 324,40"/>
  </g>
  <g stroke="#fffbe6" stroke-width="6" opacity="0.9">
    <line x1="80" y1="52" x2="80" y2="160"/>
    <line x1="520" y1="52" x2="520" y2="160"/>
  </g>
  <!-- crowd tiers -->
  <g filter="url(#iplBlur)" opacity="0.6">
    <ellipse cx="300" cy="470" rx="300" ry="120" fill="#1b2a52"/>
    <ellipse cx="300" cy="470" rx="300" ry="120" fill="none" stroke="#3a4d82" stroke-width="10" stroke-dasharray="3 6"/>
  </g>
  <!-- stadium bowl + pitch -->
  <ellipse cx="300" cy="600" rx="320" ry="180" fill="url(#iplPitch)"/>
  <ellipse cx="300" cy="600" rx="220" ry="112" fill="none" stroke="#8ee69f" stroke-width="2" opacity="0.55"/>
  <rect x="278" y="548" width="44" height="104" rx="4" fill="#d8caa6" opacity="0.85"/>
  <!-- stumps -->
  <g stroke="#f5f0e0" stroke-width="5">
    <line x1="290" y1="560" x2="290" y2="600"/>
    <line x1="300" y1="560" x2="300" y2="600"/>
    <line x1="310" y1="560" x2="310" y2="600"/>
  </g>
  <!-- bat -->
  <g transform="rotate(-26 300 400)">
    <rect x="288" y="290" width="26" height="160" rx="13" fill="#c98a4a"/>
    <rect x="291" y="290" width="20" height="128" rx="10" fill="#e8b989"/>
    <rect x="294" y="450" width="14" height="44" rx="7" fill="#6b3f18"/>
  </g>
  <!-- ball + streak -->
  <path d="M300 300 q60 40 78 150" fill="none" stroke="#ff5252" stroke-width="3" opacity="0.4" stroke-dasharray="5 9"/>
  <circle cx="378" cy="452" r="19" fill="#c81e1e" stroke="#fff" stroke-width="2"/>
  <path d="M363 447 q15 6 30 0" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="300" y="672" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="4" fill="#ffd43b">IPL</text>
  <text x="300" y="730" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="50" letter-spacing="12" fill="#ffffff">FINAL</text>
  <text x="300" y="772" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" letter-spacing="9" fill="#9ec5ff">LIVE CRICKET</text>
  <rect width="600" height="900" fill="url(#iplVig)"/>
  <rect width="600" height="900" filter="url(#iplGrain)" opacity="0.45"/>
</svg>
